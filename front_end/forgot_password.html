<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Forgot Password | Recipe Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .forgot-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .forgot-card {
      width: min(500px, 100%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(12px);
      display: grid;
      gap: 12px;
    }
    .forgot-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin: 0;
    }
    .forgot-card p {
      margin: 0;
      color: #d8d8d8;
      font-size: 14px;
    }
    .forgot-card input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 215, 0, 0.35);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .row button {
      flex: 1;
      min-width: 180px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #d4af37, #f7e27a);
      color: #111;
    }
    .row button.secondary {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #fff;
    }
    .status {
      min-height: 20px;
      font-size: 13px;
      color: #f4f4f4;
    }
    .back-link {
      color: #ffd700;
      text-decoration: none;
      font-size: 13px;
      width: fit-content;
    }
  </style>
</head>
<body>
  <div class="bg-gold"></div>
  <div class="bg-vignette"></div>
  <div class="bg-smoke"></div>
  <div class="gold-particles"></div>

  <main class="forgot-wrap">
    <section class="forgot-card">
      <h1>Forgot Password</h1>
      <p>OTP will be sent to your registered email ID.</p>

      <input id="emailInput" type="email" placeholder="Registered Email">
      <div class="row">
        <button id="requestOtpBtn" type="button">Send OTP</button>
        <button id="resendOtpBtn" class="secondary" type="button">Resend OTP</button>
      </div>

      <input id="otpInput" type="text" placeholder="Enter OTP">
      <input id="newPasswordInput" type="password" placeholder="New Password">

      <button id="resetBtn" type="button">Reset Password</button>
      <p id="statusText" class="status"></p>
      <a class="back-link" href="/login">Back to Login</a>
    </section>
  </main>

  <script>
    const emailInput = document.getElementById("emailInput");
    const otpInput = document.getElementById("otpInput");
    const newPasswordInput = document.getElementById("newPasswordInput");
    const requestOtpBtn = document.getElementById("requestOtpBtn");
    const resendOtpBtn = document.getElementById("resendOtpBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");

    function setStatus(message) {
      statusText.textContent = message || "";
    }

    async function callApi(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        const hint = data.hint ? ` ${data.hint}` : "";
        throw new Error((data.message || "Request failed") + hint);
      }
      return data;
    }

    requestOtpBtn.addEventListener("click", async () => {
      const email = (emailInput.value || "").trim().toLowerCase();
      if (!email) {
        setStatus("Please enter registered email.");
        return;
      }
      requestOtpBtn.disabled = true;
      setStatus("Sending OTP...");
      try {
        const data = await callApi("/api/auth/forgot-password/request", { email });
        setStatus(data.message || "OTP sent.");
      } catch (err) {
        setStatus(err.message || "Failed to send OTP.");
      } finally {
        requestOtpBtn.disabled = false;
      }
    });

    resendOtpBtn.addEventListener("click", async () => {
      const email = (emailInput.value || "").trim().toLowerCase();
      if (!email) {
        setStatus("Please enter registered email.");
        return;
      }
      resendOtpBtn.disabled = true;
      setStatus("Resending OTP...");
      try {
        const data = await callApi("/api/auth/forgot-password/resend", { email });
        setStatus(data.message || "OTP resent.");
      } catch (err) {
        setStatus(err.message || "Failed to resend OTP.");
      } finally {
        resendOtpBtn.disabled = false;
      }
    });

    resetBtn.addEventListener("click", async () => {
      const email = (emailInput.value || "").trim().toLowerCase();
      const otp = (otpInput.value || "").trim();
      const newPassword = (newPasswordInput.value || "").trim();
      if (!email || !otp || !newPassword) {
        setStatus("Email, OTP, and new password are required.");
        return;
      }
      resetBtn.disabled = true;
      setStatus("Resetting password...");
      try {
        const data = await callApi("/api/auth/forgot-password/reset", {
          email,
          otp,
          newPassword
        });
        setStatus(data.message || "Password reset successful.");
        setTimeout(() => {
          window.location.href = "/login";
        }, 900);
      } catch (err) {
        setStatus(err.message || "Failed to reset password.");
      } finally {
        resetBtn.disabled = false;
      }
    });
  </script>
  <script src="/footer.js"></script>
</body>
</html>
