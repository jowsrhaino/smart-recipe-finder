<!DOCTYPE html>
<html>
<head>
<title>Add Recipe</title>
<style>
body{background:#111;color:white;font-family:Poppins;padding:40px}
input,select,textarea{width:100%;padding:10px;margin:10px 0}
.ingredient-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.ingredient-row input{flex:1;min-width:120px}
.ingredient-row .ing-image{min-width:220px}
.hint{font-size:13px;opacity:0.75;margin-top:-6px}
button{padding:8px 15px;margin-top:10px}
.remove-btn{background:red;color:white}
</style>
</head>
<body>

<h1>Add Recipe</h1>

<form id="recipeForm" enctype="multipart/form-data">

<input type="text" id="title" placeholder="Title" required>

<select id="category" required>
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
<option>Snacks</option>
<option>Side Dish</option>
</select>

<select id="cuisine" required>
<option>Indian</option>
<option>Chinese</option>
<option>Italian</option>
<option>Continental</option>
</select>

<input type="number" id="baseServes" placeholder="Base Serves" required>

<h3>Ingredients</h3> 
<p class="hint">Qty = number (e.g., 2, 0.5). Unit = measurement (g, kg, ml, l, tsp, tbsp, cup, piece).</p>
<div id="ingredientsContainer"></div>

<button type="button" onclick="addIngredient()">+ Add Ingredient</button>

<textarea id="instructions" placeholder="Instructions" required></textarea>

<input type="url" id="youtube" placeholder="YouTube Link (optional)">

<h3>Upload Image</h3>
<input type="file" id="image" accept="image/*">

<button type="submit">Submit</button>

</form>

<script>

const commonIngredients = [
 "Rice","Salt","Sugar","Oil","Chicken","Onion",
 "Tomato","Garlic","Ginger","Milk","Butter","Pepper Powder"
];

function addIngredient(){
  const div = document.createElement("div");
  div.classList.add("ingredient-row");

  div.innerHTML = `
    <input list="ingredientList" placeholder="Name" class="ing-name" required>
    <datalist id="ingredientList">
      ${commonIngredients.map(i=>`<option value="${i}">`).join("")}
    </datalist>
    <input type="number" step="0.01" placeholder="Qty (e.g., 2, 0.5)" class="ing-qty" required>
    <input list="unitList" type="text" placeholder="Unit (g, ml, tsp...)" class="ing-unit" required>
    <datalist id="unitList">
      <option value="g"></option>
      <option value="kg"></option>
      <option value="ml"></option>
      <option value="l"></option>
      <option value="tsp"></option>
      <option value="tbsp"></option>
      <option value="cup"></option>
      <option value="piece"></option>
      <option value="clove"></option>
      <option value="pinch"></option>
    </datalist>
    <input type="file" class="ing-image" accept="image/*">
    <button type="button" class="remove-btn" onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("ingredientsContainer").appendChild(div);
}

addIngredient();

document.getElementById("recipeForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const formData = new FormData();

  formData.append("title", document.getElementById("title").value);
  formData.append("category", document.getElementById("category").value);
  formData.append("cuisine", document.getElementById("cuisine").value);
  formData.append("baseServes", document.getElementById("baseServes").value);
  formData.append("instructions", document.getElementById("instructions").value);
  formData.append("youtube", document.getElementById("youtube").value || "");
  formData.append("submittedByEmail", (localStorage.getItem("userEmail") || "admin@gmail.com"));
  formData.append("submittedByName", (localStorage.getItem("userName") || "Admin"));

  const ingredients = [];
  document.querySelectorAll(".ingredient-row").forEach((row, index)=>{
    const imageField = `ingredientImage_${index}`;
    const ingredientImageFile = row.querySelector(".ing-image").files[0];

    if (ingredientImageFile) {
      formData.append(imageField, ingredientImageFile);
    }

    ingredients.push({
      name: row.querySelector(".ing-name").value,
      quantity: row.querySelector(".ing-qty").value,
      unit: row.querySelector(".ing-unit").value,
      imageField
    });
  });

  formData.append("ingredients", JSON.stringify(ingredients));

  const imageFile = document.getElementById("image").files[0];
  if(imageFile){
    formData.append("image", imageFile);
  }

  const response = await fetch("/admin/add-recipe",{
    method:"POST",
    body:formData
  });

  const data = await response.json();

  if(response.ok){
    alert("Recipe Added!");
    window.location.href="/admin";
  }else{
    alert(data.message);
  }
});

</script>
<script src="/footer.js"></script>

</body>
</html>
