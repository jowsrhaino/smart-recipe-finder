<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Contact Admin | Recipe Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .contact-wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:50px 20px;
    }
    .contact-card{
      width:min(620px,100%);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,215,0,.3);
      border-radius:24px;
      padding:26px;
      backdrop-filter:blur(12px);
      display:grid;
      gap:12px;
      position:relative;
    }
    .contact-close{
      position:absolute;
      top:14px;
      right:14px;
      width:36px;
      height:36px;
      border-radius:50%;
      border:1px solid rgba(255,215,0,.5);
      background:rgba(0,0,0,.7);
      color:#ffd700;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .contact-card h1{
      margin:0;
      font-family:'Playfair Display',serif;
      font-size:42px;
    }
    .contact-card p{
      margin:0;
      color:#d4d4d4;
      font-size:14px;
    }
    .contact-card input,
    .contact-card textarea{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,215,0,.35);
      background:rgba(255,255,255,.08);
      color:#fff;
      outline:none;
    }
    .contact-card button{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      background:linear-gradient(135deg,#d4af37,#f7e27a);
      color:#111;
      font-weight:600;
    }
    .status{font-size:13px;min-height:18px}
    .mail-link{color:#ffd700;text-decoration:none;font-size:13px}
  </style>
</head>
<body>
  <div class="bg-gold"></div>
  <div class="bg-vignette"></div>
  <div class="bg-smoke"></div>
  <div class="gold-particles"></div>

  <main class="contact-wrap">
    <section class="contact-card">
      <button class="contact-close" id="contactCloseBtn" type="button">X</button>
      <h1>Contact Admin</h1>
      <p>Need help? Send your message to admin email: <b>hamethanasren@gmail.com</b></p>

      <input id="nameInput" type="text" placeholder="Your Name">
      <input id="emailInput" type="email" placeholder="Your Email">
      <textarea id="messageInput" rows="6" placeholder="Type your message"></textarea>
      <button id="sendBtn" type="button">Send Message</button>
      <p id="statusText" class="status"></p>
      <a class="mail-link" href="mailto:hamethanasren@gmail.com">Or open mail directly</a>
    </section>
  </main>

  <script>
    const sendBtn = document.getElementById("sendBtn");
    const statusText = document.getElementById("statusText");
    const contactCloseBtn = document.getElementById("contactCloseBtn");

    function setStatus(text) {
      statusText.textContent = text || "";
    }

    sendBtn.addEventListener("click", async () => {
      const name = (document.getElementById("nameInput").value || "").trim();
      const email = (document.getElementById("emailInput").value || "").trim().toLowerCase();
      const message = (document.getElementById("messageInput").value || "").trim();
      if (!name || !email || !message) {
        setStatus("Name, email, and message are required.");
        return;
      }

      sendBtn.disabled = true;
      setStatus("Sending message...");
      try {
        const res = await fetch("/api/contact-admin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, message })
        });
        const data = await res.json();
        if (!res.ok) {
          const hint = data.hint ? ` ${data.hint}` : "";
          throw new Error((data.message || "Failed to send message.") + hint);
        }
        setStatus(data.message || "Message sent.");
        document.getElementById("messageInput").value = "";
      } catch (err) {
        setStatus(err.message || "Failed to send message.");
      } finally {
        sendBtn.disabled = false;
      }
    });

    if (contactCloseBtn) {
      contactCloseBtn.addEventListener("click", () => {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = "/user";
        }
      });
    }
  </script>
  <script src="/footer.js"></script>
</body>
</html>
